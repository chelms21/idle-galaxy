<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORBITAL_INCREMENTAL_v1.0</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #00ff41; /* Classic Terminal Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #ui-container {
            border: 1px solid #00ff41;
            padding: 20px;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .planet-card {
            border: 1px dashed #00ff41;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            background: transparent;
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover {
            background: #00ff41;
            color: #000;
        }
        button:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="stats-bar">
        <div>ENERGY: <span id="energy-display">100</span></div>
        <div>SCRAP: <span id="scrap-display">0</span></div>
        <div>DATA: <span id="data-display">0</span></div>
        <div>POP: <span id="pop-display">0 / 5</span></div>
    </div>

    <div id="controls" style="margin-bottom: 20px;">
        <button onclick="manualScrap()" style="background: #00ff41; color: #000; font-weight: bold;">[ SCRAP_WRECKAGE ] (+1 Scrap)</button>
        <button onclick="manualScan()">[ EXECUTE_SCAN ]</button>
        <button onclick="upgradeCommand()">[ EXPAND_COMMAND ]</button>
        <button onclick="recruitColonist()">[ RECRUIT_COLONIST ]</button>
        <div style="font-size: 12px; margin-top: 5px;">UNASSIGNED_WORKERS: <span id="unassigned-display">0</span></div>
    </div>

    <div id="research-section" style="border: 1px solid #00ff41; margin-top: 20px; padding: 10px;">
        <h3>CENTRAL_RESEARCH_DATABASE</h3>
        <div id="research-list">
        </div>
    </div>

    <div id="galaxy-map">
        <h3>ACTIVE_COLONIES</h3>
        <div id="planet-list">
            </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
